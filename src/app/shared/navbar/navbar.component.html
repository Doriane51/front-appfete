<nav class="bg-white shadow-lg">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <!-- Logo et menu principal -->
      <div class="flex">
        <div class="flex-shrink-0 flex items-center">
          <a routerLink="/" class="text-xl font-bold text-indigo-600">
            Salles de Fête
          </a>
        </div>
        <div class="hidden sm:ml-6 sm:flex sm:space-x-8">
          <a routerLink="/"
             routerLinkActive="border-indigo-500 text-gray-900"
             [routerLinkActiveOptions]="{exact: true}"
             class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
            Accueil
          </a>
          <a routerLink="/salles"
             routerLinkActive="border-indigo-500 text-gray-900"
             class="border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
            Salles
          </a>
        </div>
      </div>

      <!-- Menu de droite -->
      <div class="hidden sm:ml-6 sm:flex sm:items-center">
        @if (!isAuthenticated) {
          <div class="flex space-x-4">
            <a routerLink="/connexion"
               class="text-gray-500 hover:text-gray-700 px-3 py-2 rounded-md text-sm font-medium">
              Connexion
            </a>
            <a routerLink="/inscription"
               class="bg-indigo-600 text-white hover:bg-indigo-700 px-3 py-2 rounded-md text-sm font-medium">
              Inscription
            </a>
          </div>
        }

        @if (isAuthenticated) {
          <div class="flex items-center space-x-4">
            @if (isAdmin) {
              <div class="relative ml-3">
                <button type="button"
                        class="flex text-sm rounded-full focus:outline-none"
                        id="admin-menu-button">
                  <span class="text-gray-700">Admin</span>
                </button>
                <div class="absolute right-0 mt-2 w-48 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5">
                  <div class="py-1">
                    <a routerLink="/admin/dashboard"
                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                      Dashboard
                    </a>
                    <a routerLink="/admin/gestion-salles"
                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                      Gérer les salles
                    </a>
                    <a routerLink="/admin/gestion-reservations"
                       class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                      Gérer les réservations
                    </a>
                  </div>
                </div>
              </div>
            }

            @if (!isAdmin) {
              <a routerLink="/mes-reservations"
                 class="text-gray-500 hover:text-gray-700 px-3 py-2 rounded-md text-sm font-medium">
                Mes réservations
              </a>
            }

            <span class="text-gray-700 px-3 py-2 text-sm font-medium">
              Bonjour {{ userName }}
            </span>

            <button (click)="logout()"
                    class="text-gray-500 hover:text-gray-700 px-3 py-2 rounded-md text-sm font-medium">
              Déconnexion
            </button>
          </div>
        }
      </div>

      <!-- Menu mobile (hamburger) -->
      <div class="-mr-2 flex items-center sm:hidden">
        <button type="button"
                class="inline-flex items-center justify-center p-2 rounded-md text-gray-400 hover:text-gray-500 hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-indigo-500"
                aria-expanded="false">
          <span class="sr-only">Open main menu</span>
          <svg class="block h-6 w-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
          </svg>
        </button>
      </div>
    </div>
  </div>
</nav>
